<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; padding: 50px; }
        form { max-width: 500px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        input, textarea { padding: 10px; background: #222; border: 1px solid #444; color: white; }
        button { background: #f5b301; padding: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="text-align: center;">Contact Us</h1>
    <form onsubmit="alert('Message Sent!'); return false;">
        <input type="text" placeholder="Your Name" required>
        <input type="email" placeholder="Your Email" required>
        <textarea placeholder="How can we help?" rows="5"></textarea>
        <button type="submit">SEND MESSAGE</button>
    </form>
</body>
</html>
